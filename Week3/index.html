<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cork has appeared!</title>
        <style>
            body{ 
                font-family:"Courier Prime", monospace;
                background-color:#7F371F;
                color:#3F1B0F;
            }
            div{
                background-color:#FFCFBF;
                padding: 36px;
                border-radius:12px;
                box-shadow: 0px 10px 50px #3F1B0F;
            }
            .card{
                width:500px;
                height:750px;
                margin-right: auto;
                margin-left: auto;
            }
            .card > img{
                width: 100%;
                height: 300px;
                object-fit: cover;
                margin-bottom: 12px;
                border-radius: 16px;
            }
            h1{
                font-family:"Tinos", serif;
                color:#C0542F;
                font-size: 48px;
            }
            p{
                font-size: 32px;
            }
            button{
                font-family:"Courier Prime", monospace;
                font-size: 32px;
                background-color:#7F371F;
                border-width:0px;
                padding: 12px;
                border-radius: 16px;
            }
            button:hover{
                background-color:#3F1B0F;
            }
            a:link{
                color:#FF6F3F;
            }
            a:visited{
                color:#C0542F;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <img src="./cork.png"/>
            <h1>Cork Bottle</h1>
            <p>Cork is a guy who’s been stuck in a sudden timeline hopping loop for who knows how long. He doesn’t let it phase him though (usually).</p>
            <button><a href="https://artfight.net/character/4584536.cork">Art Fight! (Account Required)</a></button>
        </div>
    </body>
</html>
